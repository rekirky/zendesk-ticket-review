<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zendesk Ticket Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 480px;
      min-height: 120px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f9fafb;
    }

    header {
      background: #1f73b7;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    #extract-btn, #latest-btn {
      background: #fff;
      color: #1f73b7;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #extract-btn:hover, #latest-btn:hover { background: #e8f0fe; }
    #extract-btn:disabled, #latest-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      padding: 10px 16px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    #status.error { color: #dc2626; }

    #ticket-meta {
      padding: 10px 16px 6px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }

    #ticket-meta h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    #ticket-meta .meta-row {
      font-size: 11px;
      color: #6b7280;
      display: flex;
      gap: 12px;
    }

    #toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .toolbar-btn {
      flex: 1;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }

    .toolbar-btn:hover { background: #e5e7eb; }

    #filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    #filter-bar input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }

    #filter-bar input:focus { border-color: #1f73b7; }

    #filter-bar label {
      font-size: 11px;
      color: #374151;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #conversation {
      max-height: 420px;
      overflow-y: auto;
      padding: 8px 0;
    }

    .comment {
      padding: 10px 16px;
      border-bottom: 1px solid #f3f4f6;
    }

    .comment:last-child { border-bottom: none; }

    .comment.internal { background: #fffbeb; }
    .comment.hidden { display: none; }

    .comment-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .comment-author {
      font-weight: 600;
      font-size: 12px;
    }

    .comment-timestamp {
      font-size: 11px;
      color: #9ca3af;
    }

    .comment-badge {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: #fef3c7;
      color: #92400e;
      font-weight: 500;
    }

    .comment-index {
      font-size: 10px;
      color: #d1d5db;
      margin-left: auto;
    }

    .comment-body {
      font-size: 12px;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .comment-attachments {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .attachment-link {
      font-size: 11px;
      color: #1f73b7;
      text-decoration: none;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 3px;
      padding: 2px 6px;
      white-space: nowrap;
      overflow: hidden;
      max-width: 200px;
      text-overflow: ellipsis;
      display: inline-block;
    }

    .attachment-link:hover { background: #dbeafe; }

    #empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #9ca3af;
      font-size: 12px;
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      color: #fff;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>Zendesk Ticket Extractor</h1>
  <button id="extract-btn">Extract Ticket</button>
  <button id="latest-btn">Latest Update</button>
</header>

<div id="status">Open a Zendesk ticket then click Extract.</div>

<div id="ticket-meta" style="display:none">
  <h2 id="ticket-subject"></h2>
  <div class="meta-row">
    <span id="ticket-id-label"></span>
    <span id="ticket-comment-count"></span>
  </div>
</div>

<div id="toolbar" style="display:none">
  <button class="toolbar-btn" id="copy-text-btn">Copy as Text</button>
  <button class="toolbar-btn" id="copy-json-btn">Copy as JSON</button>
  <button class="toolbar-btn" id="download-chat-btn">Download Chat</button>
</div>

<div id="filter-bar" style="display:none">
  <input type="text" id="search-input" placeholder="Filter messages…" />
  <label>
    <input type="checkbox" id="hide-internal" />
    Hide internal
  </label>
  <label>
    <input type="checkbox" id="strip-quoted" />
    Strip quoted
  </label>
</div>

<div id="conversation"></div>
<div id="empty-state" style="display:none">No messages found matching your filter.</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
